<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Salon</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:Arial;
  background:#fffaf8;
  color:#222;
  overflow-x:hidden;
}

/* HEADER */
header{
  position:fixed;
  width:100%;
  top:0;
  z-index:999;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  padding:18px 7%;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-weight:bold;
  font-size:22px;
  color:#b76e79;
}

nav a{
  margin-left:20px;
  text-decoration:none;
  color:#333;
  font-weight:600;
}

/* HERO */
.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:120px 7% 60px;
  background:linear-gradient(135deg,#fffaf8,#fdecef);
}

.hero-text{
  max-width:520px;
}

.hero-text h1{
  font-size:55px;
  line-height:1.1;
}

.hero-text span{
  color:#b76e79;
}

.hero-text p{
  margin:20px 0;
  color:#555;
}

.btn{
  background:#b76e79;
  color:white;
  padding:14px 28px;
  border-radius:30px;
  text-decoration:none;
  display:inline-block;
}

/* IMAGE AREA */
.hero-images{
  position:relative;
  width:500px;
  height:420px;
}

/* MAIN IMAGE */
.img-main{
  position:absolute;
  width:65%;
  height:320px;
  right:0;
  top:50px;
  border-radius:25px;
  object-fit:cover;
  box-shadow:0 20px 50px rgba(0,0,0,0.2);
  animation:floatX 5s ease-in-out infinite;
}

/* SMALL IMAGES */
.small{
  position:absolute;
  width:140px;
  height:140px;
  border-radius:20px;
  object-fit:cover;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* POSITIONS */
.s1{top:0;left:0;animation:floatY 4s infinite;}
.s2{bottom:0;left:60px;animation:floatX 5s infinite;}
.s3{top:120px;left:120px;animation:floatY 6s infinite;}
.s4{bottom:40px;right:120px;animation:floatX 4s infinite;}
.s5{top:20px;right:100px;animation:floatY 5s infinite;}

/* ANIMATIONS */
@keyframes floatX{
  0%{transform:translateX(0);}
  50%{transform:translateX(-20px);}
  100%{transform:translateX(0);}
}

@keyframes floatY{
  0%{transform:translateY(0);}
  50%{transform:translateY(20px);}
  100%{transform:translateY(0);}
}

/* MOBILE */
@media(max-width:900px){
  .hero{
    flex-direction:column;
    text-align:center;
  }

  .hero-images{
    margin-top:40px;
    width:100%;
    height:360px;
  }

  .img-main{
    width:75%;
    height:250px;
  }

  .small{
    width:100px;
    height:100px;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">Beauty Salon</div>
  <nav>
    <a href="#">Služby</a>
    <a href="#">Ceník</a>
    <a href="#">Kontakt</a>
  </nav>
</header>

<section class="hero">

  <div class="hero-text">
    <h1>Krása a styl <span>pro každý den</span></h1>
    <p>Moderní nail studio a kadeřnictví. Dopřejte si luxusní péči o vlasy i nehty.</p>
    <a href="#" class="btn">Objednat se</a>
  </div>

  <div class="hero-images">

    <img class="img-main" src="https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=800&q=80">

    <img class="small s1" src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=500&q=80">
    <img class="small s2" src="https://images.unsplash.com/photo-1519014816548-bf5fe059798b?auto=format&fit=crop&w=500&q=80">
    <img class="small s3" src="https://images.unsplash.com/photo-1522337360788-8b13dee7a37e?auto=format&fit=crop&w=500&q=80">
    <img class="small s4" src="https://images.unsplash.com/photo-1596462502278-27bfdc403348?auto=format&fit=crop&w=500&q=80">
    <img class="small s5" src="https://images.unsplash.com/photo-1560066984-138dadb4c035?auto=format&fit=crop&w=500&q=80">

  </div>

</section>

</body>
</html>
